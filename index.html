<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standard Solutions Matrix</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#7d8590;
  --green:#3fb950;--green-bg:#0f2d18;
  --yellow:#d29922;--yellow-bg:#2a1f00;
  --red:#f85149;--red-bg:#3d0f0f;
  --gray:#484f58;--gray-bg:#1c2128;
  --blue:#388bfd;--purple:#bc8cff;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;min-height:100vh}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}

/* ── HEADER ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hdr-left h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.hdr-left p{font-size:12px;color:var(--muted);margin-top:2px}
.stats{display:flex;gap:20px}
.stat{text-align:center}
.stat-n{font-size:22px;font-weight:700}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}

/* ── TOOLBAR ── */
.toolbar{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:12px}
.legend-item{display:flex;align-items:center;gap:5px}
.toolbar-right{margin-left:auto;color:var(--muted)}

/* ── MATRIX WRAPPER ── */
.wrap{overflow-x:auto;padding:16px}

/* ── TABLE ── */
table{border-collapse:separate;border-spacing:0;min-width:max-content}
th,td{vertical-align:middle}

/* sticky solution column */
.sol-th,td.sol-td{position:sticky;left:0;z-index:5;background:var(--surface);min-width:170px;max-width:200px}
.sol-th{background:var(--surface);padding:6px 12px;text-align:left;font-size:11px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border)}

/* category header spans */
.cat-th{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;text-align:center;padding:6px 4px;border-bottom:2px solid currentColor;white-space:nowrap;background:var(--surface2)}
/* check sub-header */
.chk-th{font-size:10px;color:var(--muted);text-align:center;padding:3px 5px 7px;white-space:nowrap;cursor:default;background:var(--surface2);font-weight:500;border-bottom:1px solid var(--border)}
/* gap column */
.gap{width:8px;background:var(--bg)}

/* solution row */
td.sol-td{padding:7px 12px 7px 10px;border-bottom:1px solid var(--border)}
.sol-name{font-weight:600;font-size:13px;color:var(--text);display:block}
.sol-link{font-size:10px;display:block;margin-top:1px}
.sol-score{display:flex;align-items:center;gap:6px;margin-top:4px}
.score-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;max-width:80px}
.score-fill{height:100%;border-radius:2px;transition:width .3s}
.score-pct{font-size:10px;color:var(--muted)}

/* status cells */
td.cell{padding:3px;text-align:center;border-bottom:1px solid var(--border);cursor:pointer}
td.cell:hover .badge{transform:scale(1.15);filter:brightness(1.3)}
.badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;font-size:12px;font-weight:700;transition:transform .1s,filter .1s;user-select:none}
.badge.pass   {background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,.2)}
.badge.partial{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(210,153,34,.2)}
.badge.fail   {background:var(--red-bg);color:var(--red);border:1px solid rgba(248,81,73,.2)}
.badge.unknown{background:var(--gray-bg);color:var(--gray)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;max-width:480px;width:92%;position:relative;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0}
.modal-close:hover{color:var(--text)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:2px}
.modal-cat{font-size:11px;color:var(--muted);margin-bottom:12px}
.modal-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px;padding:10px 12px;background:var(--surface2);border-radius:6px;border:1px solid var(--border)}
.modal-note{font-size:12px;line-height:1.6;margin-bottom:10px;padding:10px 12px;background:var(--surface2);border-radius:6px;border-left:3px solid var(--yellow)}
.modal-links{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.mlink{font-size:11px;color:var(--blue);padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2)}
.mlink:hover{background:var(--border)}
.agent-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-top:8px;font-weight:500}
.agent-tag.active {background:rgba(63,185,80,.1);color:var(--green);border:1px solid rgba(63,185,80,.25)}
.agent-tag.planned{background:rgba(56,139,253,.1);color:var(--blue);border:1px solid rgba(56,139,253,.25)}
.upd{font-size:10px;color:var(--muted);margin-top:6px}
.sep{height:1px;background:var(--border);margin:12px 0}
.status-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}

/* ── TOOLTIP CARD ── */
#tipcard{display:none;position:fixed;z-index:2000;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;max-width:290px;box-shadow:0 8px 24px rgba(0,0,0,.55);pointer-events:none;transition:opacity .1s}
#tipcard.on{display:block}
.tip-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px}
.tip-desc{font-size:11px;color:var(--muted);line-height:1.55}
.tip-doc{font-size:10px;margin-top:8px;padding-top:7px;border-top:1px solid var(--border)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <h1>📊 Standard Solutions Matrix</h1>
    <p id="sub">Loading…</p>
  </div>
  <div class="stats" id="stats"></div>
</div>

<div class="toolbar">
  <span style="font-weight:600;color:var(--muted)">Status:</span>
  <div class="legend-item"><span class="badge pass" style="width:18px;height:18px;font-size:10px">✓</span> Pass</div>
  <div class="legend-item"><span class="badge partial" style="width:18px;height:18px;font-size:10px">~</span> Partial / PR open</div>
  <div class="legend-item"><span class="badge fail" style="width:18px;height:18px;font-size:10px">✗</span> Fail</div>
  <div class="legend-item"><span class="badge unknown" style="width:18px;height:18px;font-size:10px">?</span> Not yet checked</div>
  <span class="toolbar-right" id="upd"></span>
</div>

<div class="wrap"><div id="matrix"></div></div>

<div class="overlay" id="ov" onclick="maybeClose(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="mcontent"></div>
  </div>
</div>

<div id="tipcard"><div class="tip-name"></div><div class="tip-desc"></div><div class="tip-doc"></div></div>

<script>
const ICON = {pass:'✓',partial:'~',fail:'✗',unknown:'?'};
const LABEL = {pass:'Pass',partial:'Partial / PR open',fail:'Fail',unknown:'Not yet checked'};
let D = null;

async function init(){
  try{const r=await fetch('./matrix-data.json');if(r.ok)D=await r.json();}catch(e){}
  if(!D)D=FALLBACK;
  render();
}

function score(sol){
  const total=D.checks.length;
  let pts=0;
  D.checks.forEach(c=>{
    const s=sol.checks?.[c.id]?.status||'unknown';
    if(s==='pass')pts+=2;
    if(s==='partial')pts+=1;
  });
  return Math.round(pts/(total*2)*100);
}

function scoreColor(pct){
  if(pct>=75)return'var(--green)';
  if(pct>=40)return'var(--yellow)';
  if(pct>0)return'var(--red)';
  return'var(--gray)';
}

function render(){
  const total=D.solutions.length;
  const checks=D.checks.length;
  let pass=0,partial=0,fail=0,unk=0;
  D.solutions.forEach(s=>D.checks.forEach(c=>{
    const st=s.checks?.[c.id]?.status||'unknown';
    if(st==='pass')pass++;else if(st==='partial')partial++;
    else if(st==='fail')fail++;else unk++;
  }));

  document.getElementById('sub').textContent=`${total} solutions · ${checks} checks · ${D.solutions.reduce((a,s)=>a+Object.keys(s.checks||{}).length,0)} results logged`;
  document.getElementById('upd').textContent=`Last updated: ${D.lastUpdated}`;
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="stat-n" style="color:var(--green)">${pass}</div><div class="stat-l">Pass</div></div>`+
    `<div class="stat"><div class="stat-n" style="color:var(--yellow)">${partial}</div><div class="stat-l">Partial</div></div>`+
    `<div class="stat"><div class="stat-n" style="color:var(--red)">${fail}</div><div class="stat-l">Fail</div></div>`+
    `<div class="stat"><div class="stat-n" style="color:var(--gray)">${unk}</div><div class="stat-l">Unchecked</div></div>`;

  // group checks by category (preserving category order)
  const catOrder=D.categories.map(c=>c.id);
  const grouped=Object.fromEntries(D.categories.map(c=>[c.id,[]]));
  D.checks.forEach(c=>{if(grouped[c.category])grouped[c.category].push(c);});
  const catMap=Object.fromEntries(D.categories.map(c=>[c.id,c]));

  let h='<table>';

  // ROW 1 — solution label + category headers
  h+=`<tr><th class="sol-th" rowspan="2">Solution</th>`;
  catOrder.forEach(cid=>{
    const checks=grouped[cid];if(!checks.length)return;
    const cat=catMap[cid];
    h+=`<th class="cat-th" colspan="${checks.length}" style="color:${cat.color}">${cat.name}</th>`;
    h+=`<th class="gap" rowspan="2"></th>`;
  });
  h+='</tr>';

  // ROW 2 — check sub-headers
  h+='<tr>';
  catOrder.forEach(cid=>{
    const checks=grouped[cid];if(!checks.length)return;
    checks.forEach(c=>{
      h+=`<th class="chk-th" data-chkid="${c.id}">${c.shortName}</th>`;
    });
  });
  h+='</tr>';

  // DATA ROWS
  D.solutions.forEach((sol,si)=>{
    const bg=si%2===0?'var(--surface)':'var(--bg)';
    const pct=score(sol);
    const sc=scoreColor(pct);
    h+=`<tr>`;
    h+=`<td class="sol-td" style="background:${bg}">
      <span class="sol-name">${sol.name}</span>
      <a class="sol-link" href="https://github.com/${sol.repo}" target="_blank">${sol.id}</a>
      <div class="sol-score">
        <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${sc}"></div></div>
        <span class="score-pct">${pct}%</span>
      </div>
    </td>`;
    catOrder.forEach(cid=>{
      const checks=grouped[cid];if(!checks.length)return;
      checks.forEach(c=>{
        const r=sol.checks?.[c.id];
        const st=r?.status||'unknown';
        h+=`<td class="cell" style="background:${bg}" onclick="detail('${sol.id}','${c.id}')" title="${sol.name}: ${c.shortName} — ${LABEL[st]}">
          <div class="badge ${st}">${ICON[st]}</div>
        </td>`;
      });
      h+='<td class="gap"></td>';
    });
    h+='</tr>';
  });

  h+='</table>';
  document.getElementById('matrix').innerHTML=h;
}

function detail(sid,cid){
  const sol=D.solutions.find(s=>s.id===sid);
  const chk=D.checks.find(c=>c.id===cid);
  if(!sol||!chk)return;
  const r=sol.checks?.[cid];
  const st=r?.status||'unknown';
  const cat=D.categories.find(c=>c.id===chk.category);
  const agTag=chk.agent
    ?`<span class="agent-tag active">🤖 Agent: ${chk.agent}</span>`
    :`<span class="agent-tag planned">💡 Agent: planned</span>`;
  const links=[];
  if(chk.docUrl)links.push(`<a class="mlink" href="${chk.docUrl}" target="_blank">📖 Guidelines</a>`);
  if(r?.prUrl)links.push(`<a class="mlink" href="${r.prUrl}" target="_blank">🔀 Pull Request</a>`);
  if(r?.issueUrl)links.push(`<a class="mlink" href="${r.issueUrl}" target="_blank">🐛 Issue</a>`);
  if(r?.reportUrl)links.push(`<a class="mlink" href="${r.reportUrl}" target="_blank">📄 Report</a>`);
  links.push(`<a class="mlink" href="https://github.com/${sol.repo}" target="_blank">📁 Repo</a>`);

  document.getElementById('mcontent').innerHTML=
    `<div class="status-row"><div class="badge ${st}" style="flex-shrink:0">${ICON[st]}</div>
      <div><h2>${sol.name}</h2></div>
     </div>
     <div class="modal-cat">${chk.name} &bull; <span style="color:${cat?.color}">${cat?.name}</span></div>
     <div class="sep"></div>
     <div class="modal-desc">${chk.description}</div>
     ${r?.note?`<div class="modal-note">${r.note}</div>`:''}
     ${agTag}
     ${r?.updatedAt?`<div class="upd">Checked: ${r.updatedAt}</div>`:''}
     ${links.length?`<div class="modal-links">${links.join('')}</div>`:''}`;
  document.getElementById('ov').classList.add('on');
}

function closeModal(){document.getElementById('ov').classList.remove('on');}
// ── Tooltip card ────────────────────────────────────────────────────────────
const _tip=document.getElementById('tipcard');
document.addEventListener('mouseover',e=>{
  const th=e.target.closest('[data-chkid]');
  if(!th){_tip.classList.remove('on');return;}
  const c=D?.checks?.find(x=>x.id===th.dataset.chkid);
  if(!c)return;
  _tip.querySelector('.tip-name').textContent=c.name;
  _tip.querySelector('.tip-desc').textContent=c.description||'';
  const docEl=_tip.querySelector('.tip-doc');
  docEl.innerHTML=c.docUrl
    ?`<a href="${c.docUrl}" target="_blank" style="color:var(--blue);pointer-events:auto">📖 Existing guideline &rarr;</a>`
    :'';
  const rect=th.getBoundingClientRect();
  _tip.style.left=Math.min(rect.left,window.innerWidth-300)+'px';
  _tip.style.top=(rect.bottom+6)+'px';
  _tip.classList.add('on');
});
document.addEventListener('mouseout',e=>{
  const th=e.target.closest('[data-chkid]');
  if(th)_tip.classList.remove('on');
});

function maybeClose(e){if(e.target===document.getElementById('ov'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

    }
  ],
  "solutions": [
    {
      "id": "SLC-S-InfraOps", "name": "InfraOps",
      "repo": "SkylineCommunications/SLC-S-InfraOps",
